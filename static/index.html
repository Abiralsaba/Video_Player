<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Feed Storage</title>
    <meta name="description" content="Browse, stream, and download mission feed recordings from your rover.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ════════════ Global Header ════════════ -->
    <header id="appHeader" class="header">
        <div class="header-top">
            <div class="header-title">Autonomous Mission</div>
            <div class="header-two" style="display: flex; gap: 15px; align-items: center;">
                <!-- Connection Status UI inside header -->
                <div id="connectionStatusUI" style="display:none; align-items: center; gap:10px;">
                    <div class="server-badge" title="Connected Server">
                        <div class="status-dot"></div>
                        <span id="serverLabel">localhost:3000</span>
                    </div>
                    <div class="video-count" title="Available Videos">
                        <span id="videoCount">0 videos</span>
                    </div>
                    <button id="disconnectBtn" class="disconnect-btn" title="Disconnect">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="square">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <img class="logo" src="../asset/UMRT new logo.png" alt="UMRT" style="height: 50px; object-fit: contain;">
            </div>
        </div>

        <nav class="header-nav">
            <a href="../index.html" class="nav-link">Dashboard</a>
            <a href="../3D/index.html" class="nav-link">3D Terrain View</a>
            <a href="../RTSP-Cam-feed-main/index.html" class="nav-link">Camera Feed</a>
            <a href="../rover_status.html" class="nav-link">Rover Status</a>
            <a href="../Science/index.html" class="nav-link">Science Dashboard</a>
            <a href="index.html" class="nav-link active">Detection Feed Storage</a>
            <a href="../Controller/index.html" class="nav-link">Controller</a>
        </nav>
    </header>

    <!-- ════════════ Connection Dialog ════════════ -->
    <div class="connect-overlay" id="connectOverlay">
        <div class="connect-dialog">
            <div class="connect-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="var(--yellow)" stroke="var(--text-main)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="0" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
            </div>
            <h2>Connect to Server</h2>
            <p class="connect-subtitle">Enter the IP address and port of the mission feed server.</p>

            <div class="form-group">
                <label for="serverIp">Server IP Address</label>
                <input type="text" id="serverIp" value="192.168.1.120" placeholder="e.g. 192.168.1.120"
                    autocomplete="off">
            </div>
            <div class="form-group">
                <label for="serverPort">Port</label>
                <input type="number" id="serverPort" value="3000" placeholder="e.g. 3000" autocomplete="off">
            </div>

            <div class="connect-error" id="connectError"></div>

            <button class="connect-btn" id="connectBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
                Connect
            </button>
        </div>
    </div>

    <!-- ════════════ Main App (hidden until connected) ════════════ -->
    <div class="app" id="app" style="display:none;">

        <!-- Time Filters -->
        <div class="filter-wrap" id="filterWrap">
            <button class="filter-btn active" data-filter="all">All Videos</button>
            <button class="filter-btn" data-filter="day">Past 24h</button>
            <button class="filter-btn" data-filter="hour">Past Hour</button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading mission feed…</p>
        </div>

        <!-- Grid -->
        <main>
            <div class="grid" id="videoGrid"></div>
        </main>

        <!-- Fullscreen Player Modal -->
        <div class="modal-overlay" id="modal">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <video id="modalVideo" controls autoplay></video>
                <p class="modal-title" id="modalTitle"></p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
