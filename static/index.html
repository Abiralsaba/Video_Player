<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Feed — Video Gallery</title>
    <meta name="description" content="Browse, stream, and download mission feed recordings from your rover.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ════════════ Connection Dialog ════════════ -->
    <div class="connect-overlay" id="connectOverlay">
        <div class="connect-dialog">
            <div class="connect-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#cg)" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="cg" x1="0" y1="0" x2="24" y2="24">
                            <stop stop-color="#6c5ce7" />
                            <stop offset="1" stop-color="#a855f7" />
                        </linearGradient>
                    </defs>
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
            </div>
            <h2>Connect to Server</h2>
            <p class="connect-subtitle">Enter the IP address and port of the mission feed server.</p>

            <div class="form-group">
                <label for="serverIp">Server IP Address</label>
                <input type="text" id="serverIp" value="192.168.1.120" placeholder="e.g. 192.168.1.120"
                    autocomplete="off">
            </div>
            <div class="form-group">
                <label for="serverPort">Port</label>
                <input type="number" id="serverPort" value="3000" placeholder="e.g. 3000" autocomplete="off">
            </div>

            <div class="connect-error" id="connectError"></div>

            <button class="connect-btn" id="connectBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
                Connect
            </button>
        </div>
    </div>

    <!-- ════════════ Main App (hidden until connected) ════════════ -->
    <div class="app" id="app" style="display:none;">

        <!-- Header -->
        <header id="appHeader">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#g1)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="g1" x1="0" y1="0" x2="24" y2="24">
                            <stop stop-color="#6c5ce7" />
                            <stop offset="1" stop-color="#a855f7" />
                        </linearGradient>
                    </defs>
                    <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
                Mission Feed
            </div>
            <div class="header-right">
                <span class="server-badge" id="serverBadge">
                    <span class="status-dot"></span>
                    <span id="serverLabel">Connected</span>
                </span>
                <span class="video-count" id="videoCount"></span>
                <button class="disconnect-btn" id="disconnectBtn" title="Disconnect">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Search -->
        <div class="search-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="searchInput" placeholder="Search mission recordings…" autocomplete="off">
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading mission feed…</p>
        </div>

        <!-- Grid -->
        <main>
            <div class="grid" id="videoGrid"></div>
        </main>

        <!-- Fullscreen Player Modal -->
        <div class="modal-overlay" id="modal">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <video id="modalVideo" controls autoplay></video>
                <p class="modal-title" id="modalTitle"></p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
